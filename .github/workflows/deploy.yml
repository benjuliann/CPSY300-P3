name: CI/CD Pipeline Simulation

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '25.x'

      - name: Install dependencies
        run: npm install

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build with the correct repository name
      - name: Build Docker image
        run: docker build -t bucketmonkey/projwebapp:latest .

      # Push with the correct repository name
      - name: Push Docker image
        run: docker push bucketmonkey/projwebapp:latest

      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT || 22 }}
          script: |
            # Pull the latest image
            sudo docker pull bucketmonkey/projwebapp:latest

            # Stop and remove any container using port 80
            sudo docker ps -q --filter "publish=80" | xargs -r sudo docker stop
            sudo docker ps -aq --filter "publish=80" | xargs -r sudo docker rm

            # Also stop/remove the container with our specific name (just in case)
            sudo docker stop projwebapp || true
            sudo docker rm projwebapp || true

            # Run the new container
            sudo docker run -d \
              --name projwebapp \
              --restart unless-stopped \
              -p 80:3000 \
              bucketmonkey/projwebapp:latest

            # Clean up unused images
            sudo docker image prune -f
            #testtest
