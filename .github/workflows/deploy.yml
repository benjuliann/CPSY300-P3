name: CI/CD Pipeline Simulation

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Setup Node
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '25.x'

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build Docker image
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest .

      # Push Docker image
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest

      # Deploy to Azure VM
      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Pull the latest image
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest

            # Stop and remove the old container (ignore errors if not found)
            sudo docker stop my-app || true
            sudo docker rm my-app || true

            # Run the new container
            sudo docker run -d \
              --name my-app \
              --restart unless-stopped \
              -p 80:3000 \
              ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest

            # Clean up unused images to save space
            sudo docker image prune -f